sentero:
  enabled: true
  behavior:
    learning_days: 14

app:
  dev_mode: false

logging:
  level: INFO

sensor_sources:
  source: mixed
  development:
    adapter: homeassistant
  production:
    adapters:
      - zigbee2mqtt
      - mqtt

home_assistant:
  url: http://homeassistant.local:8123
  token: HA_TOKEN

mqtt:
  host: homeassistant.local
  port: 1883
  username: SENTERO_MQTT_USERNAME
  password: SENTERO_MQTT_PASSWORD
  topic_prefix: zigbee2mqtt
  snapshot_timeout: 0.5
  bootstrap_events: ""

esp32:
  topic_prefix: sentero
  provisioning_url: http://192.168.4.1/api/provision
  provisioning_timeout: 10
  mqtt_wait_timeout: 30

zigbee:
  provider: auto

updates:
  channel: stable
  mode: zip
  base_url: https://seirafi.de/robotersteve/sentero
  manifest_path: update-manifest.json
  manifest_url: ""

llm:
  # rule_based keeps Sentero fully local and is the safe default.
  # Set provider to openai, gemini, claude or llama/ollama when wanted.
  # rule_based/openai/emini/claude/llama:
  provider: gemini
  timeout_seconds: 30
  openai:
    api_key: OPENAI_API_KEY
    model: gpt-4.1-mini
  gemini:
    api_key: GEMINI_API_KEY
    model: gemini-2.5-flash
  claude:
    api_key: CLAUDE_API_KEY
    model: claude-3-5-sonnet-latest
  llama:
    base_url: http://localhost:11434
    model: qwen2.5:3b
