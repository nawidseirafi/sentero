services:
  sentero:
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file:
      - .env
    environment:
      SENTERO_SENSOR_SOURCE: ${SENTERO_DOCKER_SENSOR_SOURCE:-mqtt}
      SENTERO_MQTT_HOST: mosquitto
      SENTERO_MQTT_PORT: 1883
      SENTERO_ZIGBEE2MQTT_TOPIC_PREFIX: ${SENTERO_ZIGBEE2MQTT_TOPIC_PREFIX:-zigbee2mqtt}
      SENTERO_UPDATE_MODE: ${SENTERO_UPDATE_MODE:-zip}
      UPDATE_BASE_URL: ${UPDATE_BASE_URL:-https://seirafi.de/robotersteve/sentero}
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./config:/app/config:ro
    depends_on:
      - mosquitto

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./docker/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./data/mosquitto:/mosquitto/data
      - ./data/mosquitto-log:/mosquitto/log

  zigbee2mqtt:
    image: koenkk/zigbee2mqtt:latest
    environment:
      TZ: Europe/Berlin
    volumes:
      - ./data/zigbee2mqtt:/app/data
    depends_on:
      - mosquitto
    profiles:
      - production

volumes:
